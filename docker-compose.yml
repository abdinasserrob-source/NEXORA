# PostgreSQL pour le développement local — aligné sur DATABASE_URL par défaut du projet :
# postgresql://postgres:postgres@localhost:5432/nexora?schema=public
#
# Démarrage : docker compose up -d
# Puis : npx prisma migrate deploy && npm run db:seed
services:
  db:
    image: postgres:16-alpine
    container_name: nexora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexora
    ports:
      - "5432:5432"
    volumes:
      - nexora_pgdata:/var/lib/postgresql/data

volumes:
  nexora_pgdata:
